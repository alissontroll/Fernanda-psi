<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fernanda Campos | Psicóloga Clínica</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      background: linear-gradient(160deg, #ede8f7 0%, #d9ccf2 50%, #c9bfed 100%);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 48px 20px 60px;
    }

    .card {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── Photo ── */
    .photo-wrap {
      width: 210px;
      height: 210px;
      border-radius: 50%;
      background: #c9bef0;
      overflow: hidden;
      margin-bottom: 28px;
      box-shadow: 0 4px 24px rgba(120,90,180,0.18);
    }
    .photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .photo-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 80px;
      color: #a08acc;
    }

    /* ── Name & subtitle ── */
    .name {
      font-size: clamp(2rem, 8vw, 2.6rem);
      font-weight: 900;
      color: #3a3347;
      text-align: center;
      letter-spacing: 0.01em;
      line-height: 1.1;
      margin-bottom: 10px;
    }
    .subtitle {
      font-size: clamp(0.95rem, 3.5vw, 1.1rem);
      font-weight: 600;
      color: #6b5e85;
      text-align: center;
      line-height: 1.5;
      margin-bottom: 28px;
    }

    /* ── Divider ── */
    .divider {
      width: 100%;
      height: 1.5px;
      background: linear-gradient(90deg, transparent, #b0a0d8, transparent);
      margin-bottom: 28px;
    }

    /* ── Accordion ── */
    .accordion {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .acc-item {
      border: 2px solid #9b8cc4;
      border-radius: 18px;
      overflow: hidden;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(4px);
      transition: box-shadow 0.2s;
    }
    .acc-item:hover { box-shadow: 0 4px 18px rgba(120,90,180,0.15); }

    .acc-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 22px;
      background: transparent;
      border: none;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      font-size: clamp(1rem, 4vw, 1.15rem);
      font-weight: 700;
      color: #3a3347;
      text-align: left;
      gap: 12px;
    }

    .acc-star {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      color: #3a3347;
      transition: transform 0.35s ease, color 0.2s;
    }
    .acc-item.open .acc-star {
      transform: rotate(45deg);
      color: #7c5cbf;
    }

    .acc-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.38s ease, padding 0.3s;
    }
    .acc-body-inner {
      padding: 0 22px 22px;
      font-size: 0.97rem;
      font-weight: 600;
      color: #55496e;
      line-height: 1.7;
    }
    .acc-body-inner a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
      padding: 12px 22px;
      background: #7c5cbf;
      color: #fff;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.95rem;
      transition: background 0.2s, transform 0.15s;
    }
    .acc-body-inner a:hover { background: #6447a8; transform: translateY(-1px); }

    .faq-item { margin-bottom: 14px; }
    .faq-item strong { display: block; margin-bottom: 4px; color: #3a3347; }

    .acc-item.open .acc-body { max-height: 2000px; }

    /* ── Animações ── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse-ring {
      0%   { box-shadow: 0 0 0 0 rgba(150,110,210,0.35); }
      70%  { box-shadow: 0 0 0 18px rgba(150,110,210,0); }
      100% { box-shadow: 0 0 0 0 rgba(150,110,210,0); }
    }
    @keyframes gradientMove {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Fundo animado */
    body {
      background: linear-gradient(160deg, #ede8f7, #d9ccf2, #c9bfed, #e0d5f5, #cfc3ee);
      background-size: 300% 300%;
      animation: gradientMove 8s ease infinite;
    }

    /* Fade-in nos elementos */
    .photo-wrap {
      animation: fadeInUp 0.8s ease both, pulse-ring 2.5s ease-out 1s infinite;
    }
    .name {
      animation: fadeInUp 0.8s ease 0.2s both;
    }
    .subtitle {
      animation: fadeInUp 0.8s ease 0.35s both;
    }
    .divider {
      animation: fadeInUp 0.8s ease 0.45s both;
    }
    .acc-item:nth-child(1) { animation: fadeInUp 0.8s ease 0.5s both; }
    .acc-item:nth-child(2) { animation: fadeInUp 0.8s ease 0.65s both; }
    .acc-item:nth-child(3) { animation: fadeInUp 0.8s ease 0.8s both; }
    .acc-item:nth-child(4) { animation: fadeInUp 0.8s ease 0.95s both; }

    /* ── Gradiente animado no nome ── */
    @keyframes textGradient {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .name {
      background: linear-gradient(90deg, #3a3347, #7c5cbf, #a07dd4, #3a3347);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeInUp 0.8s ease 0.2s both, textGradient 4s ease infinite;
    }



    /* ── Shimmer nos botões ── */
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    .acc-btn {
      position: relative;
      overflow: hidden;
    }
    .acc-btn::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.25) 50%, transparent 100%);
      background-size: 200% auto;
      animation: shimmer 3s linear infinite;
      pointer-events: none;
    }

    /* ── Pulse no botão WhatsApp ── */
    @keyframes whatsappPulse {
      0%   { transform: scale(1); box-shadow: 0 0 0 0 rgba(37,211,102,0.5); }
      50%  { transform: scale(1.04); box-shadow: 0 0 0 10px rgba(37,211,102,0); }
      100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(37,211,102,0); }
    }
    .acc-body-inner a {
      animation: whatsappPulse 2s ease infinite;
      display: inline-flex;
    }
  </style>
</head>
